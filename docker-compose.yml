services:
  gymly-api:
    build: ./server
    ports:
      - "3200:3000"
    volumes:
      - gymly-data:/data
    networks:
      - shared
      - default
    healthcheck:
      test: ["CMD", "bun", "run", "src/healthcheck.ts"]
      interval: 60s
      timeout: 5s
      retries: 2
    restart: unless-stopped

volumes:
  gymly-data:

networks:
  shared:
    name: openclaw_shared
    external: true
